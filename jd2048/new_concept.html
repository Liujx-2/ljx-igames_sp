<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 · 经典离线</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1e2c 0%, #2d3348 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
        }
        .game-wrapper {
            background: #2c3145;
            padding: 24px 24px 32px;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.06);
            max-width: 100%;
        }
        .game-container {
            background: #b8ad9a;
            padding: 20px 20px 24px;
            border-radius: 36px;
            box-shadow: inset 0 -6px 0 #7d7262, inset 0 6px 12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 280px;
        }
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 4px 16px 4px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .title {
            font-size: 2rem;
            font-weight: 800;
            color: #f5f0e8;
            text-shadow: 0 3px 0 #5a4f40, 0 0 10px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }
        .score-area {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .score-box {
            background: #1e2235;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: inset 0 3px 8px #0a0d17, 0 4px 0 #3d435a;
            color: #facc15;
            font-weight: 700;
            font-size: 1.3rem;
            text-align: center;
            min-width: 70px;
        }
        .score-box span {
            display: block;
            font-size: 0.65rem;
            color: #b0bedb;
            font-weight: 400;
            letter-spacing: 1px;
        }
        .reset-btn {
            background: #2d3349;
            border: none;
            color: white;
            font-size: 1.8rem;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #141a28, 0 4px 12px rgba(0,0,0,0.5);
            transition: all 0.06s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .reset-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #141a28;
        }
        /* 画布 */
        .canvas-wrapper {
            background: #8f8270;
            padding: 12px;
            border-radius: 32px;
            box-shadow: inset 0 0 0 2px #6b5f50, inset 0 8px 16px rgba(0,0,0,0.5);
            width: 100%;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background: #cdc1b4;
            border-radius: 24px;
            box-shadow: 0 0 0 1px #4d4236;
            touch-action: none;
            margin: 0 auto;
            image-rendering: crisp-edges;
        }
        /* 底部 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 14px 4px 0 4px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .status-msg {
            background: #1e2235;
            padding: 6px 20px;
            border-radius: 40px;
            box-shadow: inset 0 2px 6px #0a0d17;
            color: #d0def5;
            font-weight: 500;
            font-size: 0.95rem;
            min-height: 36px;
            display: flex;
            align-items: center;
        }
        .best-score {
            background: #1e2235;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: inset 0 2px 6px #0a0d17;
            color: #facc15;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .best-score span {
            color: #b0bedb;
            font-weight: 400;
            font-size: 0.75rem;
        }
        @media (max-width: 480px) {
            .game-wrapper { padding: 12px; }
            .game-container { padding: 12px; }
            .title { font-size: 1.5rem; }
            .score-box { font-size: 1.0rem; padding: 4px 12px; min-width: 55px; }
            .reset-btn { width: 44px; height: 44px; font-size: 1.4rem; }
            .status-msg { font-size: 0.8rem; padding: 4px 14px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <!-- 头部 -->
        <div class="header">
            <div class="title">“新概念”2048</div>
            <div class="score-area">
                <div class="score-box"><span>分数</span><span id="scoreDisplay">0</span></div>
                <button class="reset-btn" id="resetButton">↻</button>
            </div>
        </div>

        <!-- 画布 -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <!-- 底部 -->
        <div class="status-bar">
            <div class="status-msg" id="statusMsg">⬆️ 滑动合并数字</div>
            <div class="best-score"><span>🏆</span> <span id="bestScoreDisplay">0</span></div>
        </div>
    </div>
</div>
<script>
    (function() {
        // ----- 2048 核心 -----
        const SIZE = 4;
        let grid = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('bestScore2048')) || 0;
        let gameOver = false;
        let winFlag = false;        // 是否达到2048 (胜利)
        let continueAfterWin = false; // 是否继续玩

        // DOM
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestScoreDisplay = document.getElementById('bestScoreDisplay');
        const statusMsg = document.getElementById('statusMsg');
        const resetBtn = document.getElementById('resetButton');

        // 画布尺寸
        let cellSize = 0;
        let offsetX = 0, offsetY = 0;
        const padding = 8;

        // 颜色映射
        const COLORS = {
            0:    '#cdc1b4',
            2:    '#eee4da',
            4:    '#ede0c8',
            8:    '#f2b179',
            16:   '#f59563',
            32:   '#f67c5f',
            64:   '#f65e3b',
            128:  '#edcf72',
            256:  '#edcc61',
            512:  '#edc850',
            1024: '#edc53f',
            2048: '#edc22e',
            4096: '#60d992',
            8192: '#3c9a6e',
        };
        const TEXT_COLORS = {
            2:    '#776e65',
            4:    '#776e65',
            8:    '#f9f6f2',
            16:   '#f9f6f2',
            32:   '#f9f6f2',
            64:   '#f9f6f2',
            128:  '#f9f6f2',
            256:  '#f9f6f2',
            512:  '#f9f6f2',
            1024: '#f9f6f2',
            2048: '#f9f6f2',
            4096: '#f9f6f2',
            8192: '#f9f6f2',
        };

        // ----- 初始化 -----
        function initGrid() {
            grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            score = 0;
            gameOver = false;
            winFlag = false;
            continueAfterWin = false;
            addRandomTile();
            addRandomTile();
            updateScore();
            drawGrid();
            statusMsg.innerText = '⬆️ 滑动合并数字';
        }

        // 添加随机方块 (2 或 4)
        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length === 0) return false;
            const {r, c} = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2048 : 4096;
            return true;
        }

        // ----- 移动逻辑 (滑动) -----
        function slideRow(row) {
            // 去掉零
            let arr = row.filter(v => v !== 0);
            let newRow = [];
            let i = 0;
            while (i < arr.length) {
                if (i + 1 < arr.length && arr[i] === arr[i+1]) {
                    newRow.push(arr[i] * 2);
                    score += arr[i] * 2;
                    i += 2;
                } else {
                    newRow.push(arr[i]);
                    i++;
                }
            }
            while (newRow.length < SIZE) newRow.push(0);
            return newRow;
        }

        function moveLeft() {
            let moved = false;
            for (let r = 0; r < SIZE; r++) {
                const old = [...grid[r]];
                const newRow = slideRow(grid[r]);
                grid[r] = newRow;
                if (old.join(',') !== newRow.join(',')) moved = true;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let r = 0; r < SIZE; r++) {
                const old = [...grid[r]];
                const reversed = [...grid[r]].reverse();
                const newRow = slideRow(reversed).reverse();
                grid[r] = newRow;
                if (old.join(',') !== newRow.join(',')) moved = true;
            }
            return moved;
        }
