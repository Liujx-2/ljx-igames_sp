<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 · 经典离线</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1e2c 0%, #2d3348 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
        }
        .game-wrapper {
            background: #2c3145;
            padding: 24px 24px 32px;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.06);
            max-width: 100%;
        }
        .game-container {
            background: #b8ad9a;
            padding: 20px 20px 24px;
            border-radius: 36px;
            box-shadow: inset 0 -6px 0 #7d7262, inset 0 6px 12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 280px;
        }
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 4px 16px 4px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .title {
            font-size: 2rem;
            font-weight: 800;
            color: #f5f0e8;
            text-shadow: 0 3px 0 #5a4f40, 0 0 10px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }
        .score-area {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .score-box {
            background: #1e2235;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: inset 0 3px 8px #0a0d17, 0 4px 0 #3d435a;
            color: #facc15;
            font-weight: 700;
            font-size: 1.3rem;
            text-align: center;
            min-width: 70px;
        }
        .score-box span {
            display: block;
            font-size: 0.65rem;
            color: #b0bedb;
            font-weight: 400;
            letter-spacing: 1px;
        }
        .reset-btn {
            background: #2d3349;
            border: none;
            color: white;
            font-size: 1.8rem;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #141a28, 0 4px 12px rgba(0,0,0,0.5);
            transition: all 0.06s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .reset-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #141a28;
        }
        /* 画布 */
        .canvas-wrapper {
            background: #8f8270;
            padding: 12px;
            border-radius: 32px;
            box-shadow: inset 0 0 0 2px #6b5f50, inset 0 8px 16px rgba(0,0,0,0.5);
            width: 100%;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background: #cdc1b4;
            border-radius: 24px;
            box-shadow: 0 0 0 1px #4d4236;
            touch-action: none;
            margin: 0 auto;
            image-rendering: crisp-edges;
        }
        /* 底部 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 14px 4px 0 4px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .status-msg {
            background: #1e2235;
            padding: 6px 20px;
            border-radius: 40px;
            box-shadow: inset 0 2px 6px #0a0d17;
            color: #d0def5;
            font-weight: 500;
            font-size: 0.95rem;
            min-height: 36px;
            display: flex;
            align-items: center;
        }
        .best-score {
            background: #1e2235;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: inset 0 2px 6px #0a0d17;
            color: #facc15;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .best-score span {
            color: #b0bedb;
            font-weight: 400;
            font-size: 0.75rem;
        }
        @media (max-width: 480px) {
            .game-wrapper { padding: 12px; }
            .game-container { padding: 12px; }
            .title { font-size: 1.5rem; }
            .score-box { font-size: 1.0rem; padding: 4px 12px; min-width: 55px; }
            .reset-btn { width: 44px; height: 44px; font-size: 1.4rem; }
            .status-msg { font-size: 0.8rem; padding: 4px 14px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <!-- 头部 -->
        <div class="header">
            <div class="title">“新概念”2048</div>
            <div class="score-area">
                <div class="score-box"><span>分数</span><span id="scoreDisplay">0</span></div>
                <button class="reset-btn" id="resetButton">↻</button>
            </div>
        </div>

        <!-- 画布 -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <!-- 底部 -->
        <div class="status-bar">
            <div class="status-msg" id="statusMsg">⬆️ 滑动合并数字</div>
            <div class="best-score"><span>🏆</span> <span id="bestScoreDisplay">0</span></div>
        </div>
    </div>
</div>
<script>
    (function() {
        // ----- 2048 核心 -----
        const SIZE = 4;
        let grid = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('bestScore2048')) || 0;
        let gameOver = false;
        let winFlag = false;        // 是否达到2048 (胜利)
        let continueAfterWin = false; // 是否继续玩

        // DOM
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestScoreDisplay = document.getElementById('bestScoreDisplay');
        const statusMsg = document.getElementById('statusMsg');
        const resetBtn = document.getElementById('resetButton');

        // 画布尺寸
        let cellSize = 0;
        let offsetX = 0, offsetY = 0;
        const padding = 8;

        // 颜色映射
        const COLORS = {
            0:    '#cdc1b4',
            2:    '#eee4da',
            4:    '#ede0c8',
            8:    '#f2b179',
            16:   '#f59563',
            32:   '#f67c5f',
            64:   '#f65e3b',
            128:  '#edcf72',
            256:  '#edcc61',
            512:  '#edc850',
            1024: '#edc53f',
            2048: '#edc22e',
            4096: '#60d992',
            8192: '#3c9a6e',
        };
        const TEXT_COLORS = {
            2:    '#776e65',
            4:    '#776e65',
            8:    '#f9f6f2',
            16:   '#f9f6f2',
            32:   '#f9f6f2',
            64:   '#f9f6f2',
            128:  '#f9f6f2',
            256:  '#f9f6f2',
            512:  '#f9f6f2',
            1024: '#f9f6f2',
            2048: '#f9f6f2',
            4096: '#f9f6f2',
            8192: '#f9f6f2',
        };

        // ----- 初始化 -----
        function initGrid() {
            grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            score = 0;
            gameOver = false;
            winFlag = false;
            continueAfterWin = false;
            addRandomTile();
            addRandomTile();
            updateScore();
            drawGrid();
            statusMsg.innerText = '⬆️ 滑动合并数字';
        }

        // 添加随机方块 (2 或 4)
        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length === 0) return false;
            const {r, c} = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2048 : 4096;
            return true;
        }

        // ----- 移动逻辑 (滑动) -----
        function slideRow(row) {
            // 去掉零
            let arr = row.filter(v => v !== 0);
            let newRow = [];
            let i = 0;
            while (i < arr.length) {
                if (i + 1 < arr.length && arr[i] === arr[i+1]) {
                    newRow.push(arr[i] * 2);
                    score += arr[i] * 2;
                    i += 2;
                } else {
                    newRow.push(arr[i]);
                    i++;
                }
            }
            while (newRow.length < SIZE) newRow.push(0);
            return newRow;
        }

        function moveLeft() {
            let moved = false;
            for (let r = 0; r < SIZE; r++) {
                const old = [...grid[r]];
                const newRow = slideRow(grid[r]);
                grid[r] = newRow;
                if (old.join(',') !== newRow.join(',')) moved = true;
            }
            return moved;
        }

        function moveRight() {
            let moved = false;
            for (let r = 0; r < SIZE; r++) {
                const old = [...grid[r]];
                const reversed = [...grid[r]].reverse();
                const newRow = slideRow(reversed).reverse();
                grid[r] = newRow;
                if (old.join(',') !== newRow.join(',')) moved = true;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let c = 0; c < SIZE; c++) {
                const col = [];
                for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
                const old = [...col];
                const newCol = slideRow(col);
                for (let r = 0; r < SIZE; r++) grid[r][c] = newCol[r];
                if (old.join(',') !== newCol.join(',')) moved = true;
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let c = 0; c < SIZE; c++) {
                const col = [];
                for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
                const old = [...col];
                const reversed = col.reverse();
                const newCol = slideRow(reversed).reverse();
                for (let r = 0; r < SIZE; r++) grid[r][c] = newCol[r];
                if (old.join(',') !== newCol.join(',')) moved = true;
            }
            return moved;
        }

        // 检查是否游戏结束
        function checkGameOver() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) return false;
                    if (c < SIZE-1 && grid[r][c] === grid[r][c+1]) return false;
                    if (r < SIZE-1 && grid[r][c] === grid[r+1][c]) return false;
                }
            }
            return true;
        }

        // 检查是否胜利 (2048出现)
        function checkWin() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 2048) return true;
                }
            }
            return false;
        }

        // 执行移动 (方向: 0左 1右 2上 3下)
        function performMove(direction) {
            if (gameOver) return false;
            // 如果赢了且没选择继续，阻止操作
            if (winFlag && !continueAfterWin) {
                statusMsg.innerText = '🎉 你赢了！点击↻继续挑战';
                
                // return false;
            }

            let moved = false;
            switch(direction) {
                case 0: moved = moveLeft(); break;
                case 1: moved = moveRight(); break;
                case 2: moved = moveUp(); break;
                case 3: moved = moveDown(); break;
                default: return false;
            }

            if (!moved) {
                statusMsg.innerText = '⬅️ 无法移动';
                return false;
            }

            // 添加新方块
            addRandomTile();
            updateScore();

            // 检查胜利
            if (!winFlag && checkWin()) {
                winFlag = true;
                statusMsg.innerText = '🎉 你赢了！继续滑动或点击↻';
                drawGrid();
                return true;
            }

            // 检查游戏结束
            if (checkGameOver()) {
                gameOver = true;
                statusMsg.innerText = '💥 游戏结束！点击↻重来';
                drawGrid();
                // 更新最高分
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('bestScore2048', bestScore);
                    bestScoreDisplay.textContent = bestScore;
                }
                return true;
            }

            statusMsg.innerText = '✅ 继续滑动';
            drawGrid();
            return true;
        }

        // ----- 更新显示 -----
        function updateScore() {
            scoreDisplay.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore2048', bestScore);
                bestScoreDisplay.textContent = bestScore;
            }
            bestScoreDisplay.textContent = bestScore;
        }

        // ----- 绘制 (精致风格) -----
        function drawGrid() {
            const w = canvas.width, h = canvas.height;
            const totalSize = Math.min(w, h) - padding * 2;
            cellSize = totalSize / SIZE;
            offsetX = (w - cellSize * SIZE) / 2;
            offsetY = (h - cellSize * SIZE) / 2;

            ctx.clearRect(0, 0, w, h);

            // 背景
            ctx.fillStyle = '#cdc1b4';
            ctx.fillRect(0, 0, w, h);

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const x = offsetX + c * cellSize + 4;
                    const y = offsetY + r * cellSize + 4;
                    const size = cellSize - 8;
                    const val = grid[r][c];
                    const color = COLORS[val] || '#3c3a32';
                    const textColor = TEXT_COLORS[val] || '#f9f6f2';

                    // 圆角方块
                    const radius = size * 0.12;
                    ctx.beginPath();
                    ctx.roundRect(x, y, size, size, radius);
                    ctx.fillStyle = color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.shadowColor = 'transparent';

                    // 数字
                    if (val !== 0) {
                        const fontSize = val < 100 ? size * 0.45 : val < 1000 ? size * 0.38 : size * 0.3;
                        ctx.font = `bold ${fontSize}px 'Segoe UI', 'Arial', sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = textColor;
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = 'rgba(0,0,0,0.15)';
                        ctx.fillText(val, x + size/2, y + size/2 + 2);
                        ctx.shadowBlur = 0;
                    }
                }
            }

            // 网格线 (装饰)
            ctx.strokeStyle = '#bbada0';
            ctx.lineWidth = 1.5;
            for (let r = 0; r <= SIZE; r++) {
                const y = offsetY + r * cellSize;
                ctx.beginPath();
                ctx.moveTo(offsetX, y);
                ctx.lineTo(offsetX + SIZE * cellSize, y);
                ctx.stroke();
            }
            for (let c = 0; c <= SIZE; c++) {
                const x = offsetX + c * cellSize;
                ctx.beginPath();
                ctx.moveTo(x, offsetY);
                ctx.lineTo(x, offsetY + SIZE * cellSize);
                ctx.stroke();
            }
        }

        // roundRect 工具
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };

        // ----- 重置 -----
        function resetGame() {
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore2048', bestScore);
            }
            initGrid();
            bestScoreDisplay.textContent = bestScore;
            drawGrid();
            statusMsg.innerText = '🔄 新游戏开始！';
            winFlag = false;
            continueAfterWin = false;
            gameOver = false;
        }

        // ----- 键盘事件 -----
        function handleKey(e) {
            const key = e.key;
            e.preventDefault();
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                let dir = -1;
                if (key === 'ArrowLeft' || key === 'a') dir = 0;
                else if (key === 'ArrowRight' || key === 'd') dir = 1;
                else if (key === 'ArrowUp' || key === 'w') dir = 2;
                else if (key === 'ArrowDown' || key === 's') dir = 3;
                if (dir !== -1) performMove(dir);
            }
        }

        // ----- 触摸滑动 (移动端) -----
        let touchStartX = 0, touchStartY = 0;
        function handleTouchStart(e) {
            e.preventDefault();
            const t = e.touches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
        }
        function handleTouchEnd(e) {
            e.preventDefault();
            if (touchStartX === 0 && touchStartY === 0) return;
            const rect = canvas.getBoundingClientRect();
            // 使用结束位置或者移动位置计算
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const dx = endX - touchStartX;
            const dy = endY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);
            if (Math.max(absDx, absDy) < 20) return; // 忽略轻触

            let dir = -1;
            if (absDx > absDy) {
                dir = dx > 0 ? 1 : 0;  // 右:1 左:0
            } else {
                dir = dy > 0 ? 3 : 2;  // 下:3 上:2
            }
            if (dir !== -1) performMove(dir);
            touchStartX = 0; touchStartY = 0;
        }

        // ----- 初始化 -----
        function setup() {
            // 读取最高分
            bestScoreDisplay.textContent = bestScore;

            // 重置
            resetBtn.addEventListener('click', resetGame);

            // 键盘
            window.addEventListener('keydown', handleKey);

            // 触摸
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });

            // 防止页面滚动
            canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

            // 启动
            initGrid();
            drawGrid();
            statusMsg.innerText = '⬆️ 滑动合并数字';
        }

        setup();
    })();
</script>
</body>
  </html>
