<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ 方块消消乐 · 离线小游戏</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2639 0%, #2a3b5c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 12px;
        }

        .game-wrapper {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            padding: 24px 24px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            width: fit-content;
            max-width: 100%;
        }

        .game-container {
            background: #0f172a;
            border-radius: 40px;
            padding: 20px 20px 28px;
            box-shadow: inset 0 6px 12px rgba(0, 0, 0, 0.6), 0 4px 0 #3b4e6b;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 280px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 8px 16px 8px;
            color: #e2e8f0;
            font-weight: 600;
            text-shadow: 0 2px 3px rgba(0,0,0,0.5);
        }

        .score-box {
            background: #1e293b;
            padding: 6px 20px 6px 18px;
            border-radius: 60px;
            font-size: 1.5rem;
            letter-spacing: 1px;
            box-shadow: inset 0 2px 6px #0b0f1a, 0 3px 0 #3b4e6b;
            color: #facc15;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .score-box span {
            font-size: 1rem;
            color: #94a3b8;
            margin-right: 4px;
        }

        .reset-btn {
            background: #2d3f5e;
            border: none;
            color: white;
            font-size: 1.6rem;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #121b2b, 0 4px 12px rgba(0,0,0,0.4);
            transition: all 0.06s linear;
            font-weight: 700;
            line-height: 1;
        }

        .reset-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #121b2b;
        }

        .grid-canvas-wrapper {
            background: #1a253b;
            padding: 12px;
            border-radius: 32px;
            box-shadow: inset 0 0 0 1px #2e405e, inset 0 8px 12px rgba(0,0,0,0.5);
            margin-bottom: 8px;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background: #1e2a41;
            border-radius: 24px;
            box-shadow: 0 0 0 1px #3a4f6e;
            touch-action: none;
            cursor: pointer;
            max-width: 420px;
            margin: 0 auto;
        }

        .status-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 14px 6px 0 6px;
            color: #b9c9e6;
            font-weight: 500;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .hint-text {
            background: #1f2d46;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.9rem;
            box-shadow: inset 0 2px 5px #0b0f1a;
            color: #b3c7f0;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .hint-text i {
            font-style: normal;
            display: inline-block;
            margin-right: 6px;
        }

        .combo-display {
            background: #1f2d46;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #facc15;
            box-shadow: inset 0 2px 5px #0b0f1a;
            min-width: 80px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .game-wrapper { padding: 12px; }
            .game-container { padding: 14px; }
            .score-box { font-size: 1.2rem; padding: 4px 14px; }
            .reset-btn { width: 44px; height: 44px; font-size: 1.4rem; }
            .grid-canvas-wrapper { padding: 8px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <!-- 头部：分数 + 重置 -->
        <div class="header">
            <div class="score-box">
                <span>🏆</span> <span id="scoreDisplay">0</span>
            </div>
            <button class="reset-btn" id="resetButton" aria-label="重新开始">↻</button>
        </div>

        <!-- 画布区域 -->
        <div class="grid-canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <!-- 状态栏 -->
        <div class="status-area">
            <div class="hint-text"><i>💡</i> 点相邻方块交换</div>
            <div class="combo-display" id="comboDisplay">⚡ 0</div>
        </div>
    </div>
</div>
<script>
    (function() {
        // ---------- 游戏配置 ----------
        const ROWS = 8;
        const COLS = 8;
        const COLORS = [
            '#f87171', // 0 红
            '#fbbf24', // 1 黄
            '#34d399', // 2 绿
            '#60a5fa', // 3 蓝
            '#a78bfa', // 4 紫
            '#f472b6'  // 5 粉
        ];
        // 消除时的高亮特效 (闪烁)
        const FLASH_DURATION = 120; // ms
        const ANIMATION_GAP = 80;   // 消除后下落动画间隔

        // ---------- DOM 元素 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');

        // ---------- 游戏状态 ----------
        let grid = [];                // 二维数组 (ROWS x COLS) 存储 0~5
        let score = 0;
        let comboCount = 0;           // 当前连击数 (每次消除后重置)
        let isProcessing = false;     // 是否正在处理消除/下落动画
        let selectedRow = -1, selectedCol = -1; // 当前选中的格子 (-1表示无)

        // 动画相关
        let animationTimer = null;
        let flashCells = [];          // 当前需要闪烁的格子 [{row, col}]
        let flashStartTime = 0;

        // 画布尺寸 (自适应)
        let cellSize = 0;
        let offsetX = 0, offsetY = 0;

        // ---------- 初始化网格 ----------
        function initGrid() {
            grid = [];
            for (let r = 0; r < ROWS; r++) {
                const row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push(Math.floor(Math.random() * COLORS.length));
                }
                grid.push(row);
            }
            // 确保初始没有三连 (直接暴力消除直到稳定)
            while (findAllMatches().length > 0) {
                const matches = findAllMatches();
                for (let m of matches) {
                    grid[m.row][m.col] = Math.floor(Math.random() * COLORS.length);
                }
            }
            selectedRow = -1;
            selectedCol = -1;
            comboCount = 0;
            score = 0;
            updateScoreAndCombo();
        }

        // ---------- 核心逻辑 ----------

        // 查找所有匹配 (返回坐标数组)
        function findAllMatches() {
            const matches = [];
            // 水平三连+
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS - 2; c++) {
                    const val = grid[r][c];
                    if (val === -1) continue;
                    let len = 1;
                    while (c + len < COLS && grid[r][c + len] === val) len++;
                    if (len >= 3) {
                        for (let i = 0; i < len; i++) {
                            matches.push({ row: r, col: c + i });
                        }
                    }
                    c += len - 1;
                }
            }
            // 垂直三连+
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS - 2; r++) {
                    const val = grid[r][c];
                    if (val === -1) continue;
                    let len = 1;
                    while (r + len < ROWS && grid[r + len][c] === val) len++;
                    if (len >= 3) {
                        for (let i = 0; i < len; i++) {
                            matches.push({ row: r + i, col: c });
                        }
                    }
                    r += len - 1;
                }
            }
            return matches;
        }

        // 消除匹配并返回消除的坐标 (同时移除格子，置为 -1)
        function eliminateMatches(matches) {
            if (matches.length === 0) return [];
            const unique = new Set();
            const eliminated = [];
            for (let m of matches) {
                const key = `${m.row},${m.col}`;
                if (!unique.has(key)) {
                    unique.add(key);
                    eliminated.push({ row: m.row, col: m.col });
                    grid[m.row][m.col] = -1;   // 标记为空
                }
            }
            return eliminated;
        }

        // 重力下落 (返回是否发生了移动)
        function applyGravity() {
            let moved = false;
            for (let c = 0; c < COLS; c++) {
                let writeRow = ROWS - 1;
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (grid[r][c] !== -1) {
                        if (r !== writeRow) {
                            grid[writeRow][c] = grid[r][c];
                            grid[r][c] = -1;
                            moved = true;
                        }
                        writeRow--;
                    }
                }
                // 填充顶部空位 (随机颜色)
                for (let r = writeRow; r >= 0; r--) {
                    grid[r][c] = Math.floor(Math.random() * COLORS.length);
                    moved = true;
                }
            }
            return moved;
        }

        // 一次完整的消除循环 (消除 -> 下落 -> 再消除 ... ) 直到稳定
        // 返回 是否消除过 (用于计分)
        function clearMatchesAndDrop() {
            let anyEliminated = false;
            let loopCount = 0;
            while (true) {
                const matches = findAllMatches();
                if (matches.length === 0) break;

                anyEliminated = true;
                // 记录消除的格子用于闪烁 (取前30个)
                const eliminatedCoords = eliminateMatches(matches);
                // 更新连击和分数 (每消除一个格子 +10 * 连击系数)
                const points = eliminatedCoords.length * 10 * (comboCount + 1);
                score += points;
                comboCount++;
                updateScoreAndCombo();

                // 闪烁特效 (只展示当前消除的格子)
                flashCells = eliminatedCoords.slice(0, 30); 
                flashStartTime = performance.now();
                drawGrid();

                // 下落 (同步)
                applyGravity();

                // 防止死循环 (最多20次)
                loopCount++;
                if (loopCount > 20) break;
            }
            return anyEliminated;
        }

        // 交换两个格子 (返回是否成功)
        function trySwap(r1, c1, r2, c2) {
            if (isProcessing) return false;
            if (r1 === r2 && c1 === c2) {
                // 点击同一个格子：取消选中
                selectedRow = -1;
                selectedCol = -1;
                drawGrid();
                return false;
            }

            // 检查是否相邻 (上下左右)
            const dr = Math.abs(r1 - r2);
            const dc = Math.abs(c1 - c2);
            if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
                // 交换
                const temp = grid[r1][c1];
                grid[r1][c1] = grid[r2][c2];
                grid[r2][c2] = temp;

                // 检查是否有匹配
                const matches = findAllMatches();
                if (matches.length > 0) {
                    // 有效交换: 清除选中状态, 进入消除流程
                    selectedRow = -1;
                    selectedCol = -1;
                    isProcessing = true;
                    // 重置连击 (消除开始)
                    comboCount = 0;
                    // 执行消除循环 (异步处理动画)
                    processElimination();
                    return true;
                } else {
                    // 无效交换: 换回来
                    const tempBack = grid[r1][c1];
                    grid[r1][c1] = grid[r2][c2];
                    grid[r2][c2] = tempBack;
                    // 取消选中 (视觉反馈)
                    selectedRow = -1;
                    selectedCol = -1;
                    drawGrid();
                    return false;
                }
            } else {
                // 不相邻: 更新选中为新格子
                selectedRow = r2;
                selectedCol = c2;
                drawGrid();
                return false;
            }
        }

        // 处理消除 + 下落 (异步, 动画)
        function processElimination() {
            if (animationTimer) {
                clearTimeout(animationTimer);
                animationTimer = null;
            }

            // 先执行一次消除 (同步)
            const hasEliminated = clearMatchesAndDrop();
            if (!hasEliminated) {
                // 没有消除 (理论上不会发生)
                isProcessing = false;
                drawGrid();
                return;
            }

            // 继续检查是否还有新匹配 (动画间隙)
            function step() {
                const matches = findAllMatches();
                if (matches.length > 0) {
                    // 还有匹配, 继续消除 (连击延续)
                    clearMatchesAndDrop();  // 内部更新 comboCount 和分数
                    drawGrid();
                    animationTimer = setTimeout(step, ANIMATION_GAP);
                } else {
                    // 稳定了
                    isProcessing = false;
                    // 重置连击显示 (但保留最后的连击数再重置)
                    comboCount = 0;
                    updateScoreAndCombo();
                    drawGrid();
                    animationTimer = null;
                }
            }

            // 初次等待, 让闪烁可见
            animationTimer = setTimeout(step, FLASH_DURATION + 80);
        }

        // ---------- 绘制 ----------
        function drawGrid() {
            const rect = canvas.getBoundingClientRect();
            const w = canvas.width;
            const h = canvas.height;
            cellSize = Math.min(w / COLS, h / ROWS);
            offsetX = (w - cellSize * COLS) / 2;
            offsetY = (h - cellSize * ROWS) / 2;

            ctx.clearRect(0, 0, w, h);

            // 绘制网格线 (细线)
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 4;

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const x = offsetX + c * cellSize;
                    const y = offsetY + r * cellSize;
                    const val = grid[r][c];
                    let color = (val >= 0 && val < COLORS.length) ? COLORS[val] : '#334155';

                    // 选中高亮
                    if (selectedRow === r && selectedCol === c) {
                        ctx.shadowBlur = 18;
                        ctx.shadowColor = '#facc15';
                    } else {
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    }

                    // 绘制方块
                    const radius = cellSize * 0.18;
                    ctx.beginPath();
                    ctx.roundRect(x + 2, y + 2, cellSize - 4, cellSize - 4, radius);
                    ctx.fillStyle = color;
                    ctx.fill();
                    // 内发光
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // 高光 (小亮点)
                    ctx.beginPath();
                    ctx.arc(x + cellSize * 0.25, y + cellSize * 0.25, cellSize * 0.08, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    ctx.fill();
                }
            }

            // 闪烁特效 (覆盖绘制)
            const now = performance.now();
            if (flashCells.length > 0 && (now - flashStartTime) < FLASH_DURATION) {
                const progress = (now - flashStartTime) / FLASH_DURATION;
                const alpha = Math.sin(progress * Math.PI) * 0.7;
                for (let f of flashCells) {
                    const { row, col } = f;
                    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) continue;
                    const x = offsetX + col * cellSize;
                    const y = offsetY + row * cellSize;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#fef08a';
                    ctx.fillStyle = `rgba(255, 255, 200, ${alpha})`;
                    ctx.beginPath();
                    ctx.roundRect(x + 2, y + 2, cellSize - 4, cellSize - 4, cellSize * 0.18);
                    ctx.fill();
                }
            } else {
                flashCells = [];
            }

            ctx.shadowBlur = 0;
        }

        // 工具: roundRect
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };

        function updateScoreAndCombo() {
            scoreSpan.textContent = score;
            comboDisplay.textContent = `⚡ ${comboCount}`;
        }

        // ---------- 事件处理 ----------
        function handleCanvasClick(e) {
            if (isProcessing) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
            const clientY = e.clientY || e.touches?.[0]?.clientY || 0;

            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;

            const col = Math.floor((canvasX - offsetX) / cellSize);
            const row = Math.floor((canvasY - offsetY) / cellSize);
            if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;

            // 如果没有任何选中, 选中当前格子
            if (selectedRow === -1 || selectedCol === -1) {
                selectedRow = row;
                selectedCol = col;
                drawGrid();
                return;
            }

            // 已选中一个格子, 尝试交换
            trySwap(selectedRow, selectedCol, row, col);
        }

        // 重置游戏
        function resetGame() {
            if (animationTimer) {
                clearTimeout(animationTimer);
                animationTimer = null;
            }
            isProcessing = false;
            flashCells = [];
            initGrid();
            selectedRow = -1;
            selectedCol = -1;
            drawGrid();
        }

        // ---------- 挂载事件 & 启动 ----------
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleCanvasClick(e);
        }, { passive: false });

        document.getElementById('resetButton').addEventListener('click', resetGame);

        // 初始化
        initGrid();
        drawGrid();

        // 窗口自适应重新绘制
        window.addEventListener('resize', drawGrid);
    })();
</script>
</body>
  </html>
